name: vipro_multi_tracker
description: Android-first Flutter client for Vipro Multi Tracker.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  connectivity_plus: ^7.0.0
  drift: ^2.34.0
  drift_flutter: ^0.3.0
  flutter_riverpod: ^3.0.0
  go_router: ^17.0.0
  home_widget: ^0.9.0
  intl: ^0.20.0
  shared_preferences: ^2.5.0
  supabase_flutter: ^2.16.0
  uuid: ^4.5.0
  workmanager: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  build_runner: ^2.10.0
  drift_dev: ^2.34.0
  flutter_lints: ^6.0.0
  mocktail: ^1.0.0

flutter:
  uses-material-design: true
