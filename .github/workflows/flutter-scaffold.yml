name: Flutter Android Branch Verification

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    if: github.head_ref == 'flutter-android-mvp' || github.ref == 'refs/heads/flutter-android-mvp'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
        with:
          ref: flutter-android-mvp
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Resolve dependencies
        working-directory: apps/flutter
        run: flutter pub get
      - name: Generate Drift sources
        working-directory: apps/flutter
        run: dart run build_runner build --delete-conflicting-outputs
      - name: Format sources
        working-directory: apps/flutter
        run: dart format lib test integration_test 2>/dev/null || dart format lib test
      - name: Analyze
        working-directory: apps/flutter
        run: flutter analyze
      - name: Test
        working-directory: apps/flutter
        run: flutter test
      - name: Build debug APK
        working-directory: apps/flutter
        run: >
          flutter build apk --debug
          --dart-define=SUPABASE_URL=https://hqdjbdkxvexuduvqccpc.supabase.co
          --dart-define=SUPABASE_PUBLISHABLE_KEY=sb_publishable_ufFPu9CzpyI9ROqCbDG6Lw_DKKGFPCl
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vipro-multi-tracker-debug-apk
          path: apps/flutter/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 14
