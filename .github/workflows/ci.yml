name: CI

on:
  pull_request:
  push:
    branches:
      - dev
      - main

permissions:
  contents: read

jobs:
  application:
    name: Application checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test
      - name: Browser tests
        run: npm run test:e2e
      - name: Build
        run: npm run build

  database:
    name: Database migration replay
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Start database-only Supabase stack
        run: npx supabase db start
      - name: Replay migrations
        run: npx supabase db reset --local --no-seed
      - name: Lint database
        run: npx supabase db lint --local --level warning --fail-on error
      - name: Stop Supabase
        if: always()
        run: npx supabase stop --no-backup
